apiVersion: v1
kind: Pod
metadata:
  name: flights-debug
  namespace: flight
spec:
  serviceAccountName: flights-sa
  restartPolicy: Never
  containers:
  - name: debug
    image: 036333380579.dkr.ecr.ap-northeast-2.amazonaws.com/airline-backend/flights:latest
    command: ["sh", "-lc"]
    args:
    - |
      node - <<'EOF'
      const { Signer } = require('@aws-sdk/rds-signer');
      const mysql = require('mysql2/promise');
      (async () => {
        try {
          const signer = new Signer({ hostname: process.env.DB_HOST, port: Number(process.env.DB_PORT), username: process.env.DB_USER, region: process.env.AWS_REGION });
          const token = await signer.getAuthToken();
          const conn = await mysql.createConnection({
            host: process.env.DB_HOST,
            port: Number(process.env.DB_PORT),
            user: process.env.DB_USER,
            password: token,
            database: process.env.DB_NAME,
            authPlugins: {
              mysql_clear_password: () => () => Buffer.from(token + '\0'),
            },
          });
          const [rows] = await conn.query('SELECT CURRENT_USER() AS currentUser');
          console.log('ok', JSON.stringify(rows));
          await conn.end();
        } catch (err) {
          console.error('debug_error', err && (err.stack || err.message || err));
          process.exit(1);
        }
      })();
      EOF
    env:
    - name: DB_HOST
      value: rds-airline-mysql-main.cluster-cb8q4mm6485z.ap-northeast-2.rds.amazonaws.com
    - name: DB_PORT
      value: "3306"
    - name: DB_USER
      value: admin
    - name: DB_NAME
      value: flights
    - name: AWS_REGION
      value: ap-northeast-2
