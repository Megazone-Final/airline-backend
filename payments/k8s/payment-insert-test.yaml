apiVersion: v1
kind: ConfigMap
metadata:
  name: airline-payment-script
  namespace: airline-payment
data:
  test-server.js: |
    const cors = require('cors');
    const express = require('express');
    const mysql = require('mysql2/promise');
    const { Signer } = require('@aws-sdk/rds-signer');

    function requiredEnv(name) {
      const value = process.env[name];
      if (!value) {
        throw new Error(`Missing required env: ${name}`);
      }
      return value;
    }

    const app = express();
    const corsOrigins = (process.env.CORS_ORIGIN || '')
      .split(',')
      .map((origin) => origin.trim())
      .filter(Boolean);

    app.use(
      cors({
        origin: corsOrigins.length > 0 ? corsOrigins : true,
        credentials: true,
      })
    );
    app.use(express.json());

    const rdsConfig = {
      region: requiredEnv('AWS_REGION'),
      hostname: requiredEnv('DB_HOST'),
      port: Number(process.env.DB_PORT || 3306),
      username: requiredEnv('DB_USER'),
    };

    const signer = new Signer(rdsConfig);

    async function getConnection() {
      const token = await signer.getAuthToken();
      return mysql.createConnection({
        host: rdsConfig.hostname,
        user: rdsConfig.username,
        password: token,
        database: requiredEnv('DB_NAME'),
        port: rdsConfig.port,
        ssl: 'Amazon RDS',
        authPlugins: {
          mysql_clear_password: () => () => Buffer.from(`${token}\0`),
        },
      });
    }

    app.get('/health', async (req, res) => {
      let conn;
      try {
        conn = await getConnection();
        await conn.query('SELECT 1');
        await conn.end();
        res.json({ status: 'ok', mysql: 'ok' });
      } catch (err) {
        if (conn) {
          await conn.end().catch(() => {});
        }
        res.status(500).json({ status: 'error', message: err.message });
      }
    });

    app.post('/api/payment', async (req, res) => {
      let conn;
      try {
        conn = await getConnection();

        const now = Date.now();
        const id = req.body.id || `PAY-TEST-${now}`;
        const userId = Number(req.body.user_id ?? req.body.userId ?? 999999);
        const reservationId =
          req.body.reservation_id ?? req.body.reservationId ?? `TEST-RES-${now}`;
        const flightId = Number(req.body.flight_id ?? req.body.flightId ?? 1);
        const amount = Number(req.body.amount ?? req.body.totalAmount ?? 10000);
        const method = req.body.method || 'CARD';
        const status = req.body.status || 'completed';
        const travelDate =
          req.body.travel_date ??
          req.body.travelDate ??
          req.body.date ??
          new Date().toISOString().split('T')[0];
        const passengerCount = Number(
          req.body.passenger_count ?? req.body.passengerCount ?? 1
        );

        await conn.execute(
          `
          INSERT INTO payments (
            id,
            user_id,
            reservation_id,
            flight_id,
            amount,
            method,
            status,
            travel_date,
            passenger_count
          ) VALUES (?, ?, ?, ?, ?, ?, ?, ?, ?)
          `,
          [id, userId, reservationId, flightId, amount, method, status, travelDate, passengerCount]
        );

        const [rows] = await conn.execute(
          `
          SELECT
            id,
            user_id AS userId,
            reservation_id AS reservationId,
            flight_id AS flightId,
            amount,
            method,
            status,
            travel_date AS travelDate,
            passenger_count AS passengerCount,
            created_at AS createdAt
          FROM payments
          WHERE id = ?
          LIMIT 1
          `,
          [id]
        );

        await conn.end();
        res.status(201).json({
          message: 'insert success',
          payment: rows[0] || null,
        });
      } catch (err) {
        if (conn) {
          await conn.end().catch(() => {});
        }
        res.status(500).json({
          message: 'insert failed',
          error: err.message,
        });
      }
    });

    const port = Number(process.env.PORT || 3000);
    app.listen(port, () => {
      console.log(`airline-payment insert test server listening on ${port}`);
    });
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: airline-payment
  namespace: airline-payment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: airline-payment
  template:
    metadata:
      labels:
        app: airline-payment
    spec:
      serviceAccountName: payments-sa
      containers:
        - name: airline-payment
          image: 036333380579.dkr.ecr.ap-northeast-2.amazonaws.com/airline-backend/payments:latest
          imagePullPolicy: Always
          command: ["sh", "-c", "NODE_PATH=/app/node_modules node /app/test/test-server.js"]
          ports:
            - containerPort: 3000
          envFrom:
            - secretRef:
                name: payments-secret
          volumeMounts:
            - name: test-script
              mountPath: /app/test
      volumes:
        - name: test-script
          configMap:
            name: airline-payment-script
---
apiVersion: v1
kind: Service
metadata:
  name: svc-payment
  namespace: airline-payment
spec:
  selector:
    app: airline-payment
  ports:
    - protocol: TCP
      port: 3000
      targetPort: 3000
  type: ClusterIP
